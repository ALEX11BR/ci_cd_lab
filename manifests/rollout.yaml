apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/alex11br/ci_cd_lab@sha256:97dcbd29dfad0ff41be9b7f67424331fb46a8e664342f9bfa5a8013c20cb283c
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
